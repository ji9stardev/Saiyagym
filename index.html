<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaiyaGym</title>
    <style>
        /* =========================================
           IMPORTAR FUENTE DE DRAGON BALL
           ========================================= */
        @font-face {
            font-family: 'DragonBall';
            src: url('saiyan.ttf') format('truetype');
        }

        /* Regla de oro para evitar que los elementos se desborden */
        * {
            box-sizing: border-box;
        }
        
        /* Regla global: Ninguna imagen puede ser más ancha que la pantalla */
        img {
            max-width: 100%;
            height: auto;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1b1918;
            color: white;
            overflow-x: hidden; 
        }
        header {
            background-color: rgb(231, 77, 0);
            color: rgb(0, 0, 0);
            padding: 15px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: fadeInUp 1s ease-out;
        }
        header img {
            max-width: 60px;
            margin-right: 15px;
        }
        header .title-image {
            max-width: 140px;
        }
        
        /* === MENÚ DE NAVEGACIÓN === */
        nav {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInUp 1s ease-out;
        }
        nav a {
            font-family: 'DragonBall', Arial, sans-serif; /* <-- Aplicamos la fuente aquí */
            font-size: 22px; /* La hacemos un poco más grande porque esta fuente suele ser pequeña */
            letter-spacing: 1px; /* Separamos un poquito las letras */
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
            transform: scale(1.1);
        }

        /* === TÍTULOS DE SECCIONES === */
        h2 {
            font-family: 'DragonBall', Arial, sans-serif; /* <-- También a los títulos */
            font-size: 35px;
            letter-spacing: 2px;
            color: rgb(231, 77, 0); /* Les damos color naranjo para que resalten */
            text-align: center;
        }

        section {
            padding: 20px;
            margin: 20px auto;
            max-width: 1200px; 
            background-color: #1d1a1a;
            color: white;
            border-radius: 8px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        footer {
            background-color: rgb(231, 77, 0);
            color: white;
            text-align: center;
            padding: 10px;
            width: 100%;
            z-index: 10;
        }
        
        footer p {
            margin: 0;
            font-size: 15px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .gallery img {
            width: 31%; 
            border-radius: 8px;
            object-fit: cover;
        }
        .bienvenida-gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .bienvenida-gallery img {
            width: 31%;
            border-radius: 8px;
        }
        .planes {
            display: flex;
            justify-content: center;
        }
        #direccion {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: 40px 0;
        }
        #direccion h2 {
            margin-bottom: 20px;
        }
        .social-icons {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .social-icons a {
            margin-right: 10px;
            text-decoration: none; 
        }
        .social-icons img {
            width: 30px;
            height: 30px;
        }
        .social-icons span {
            margin-right: 20px;
            font-size: 16px;
            color: white;
            align-self: center;
        }

        /* =========================================
           MODO CELULAR 
           ========================================= */
        @media (max-width: 768px) {
            header {
                flex-direction: row; 
                padding: 5px 10px; 
            }
            header img {
                margin-right: 10px; 
                margin-bottom: 0; 
                max-width: 45px; 
            }
            header .title-image {
                max-width: 120px; 
            }
            nav {
                flex-wrap: wrap;
            }
            nav a {
                padding: 10px 5px;
                font-size: 16px; /* Ajustado para la nueva fuente */
                width: 33.33%; 
            }
            section {
                margin: 10px;
                padding: 15px;
            }
            .bienvenida-gallery, .gallery {
                flex-direction: column;
                align-items: center;
            }
            .bienvenida-gallery img, .gallery img {
                width: 100%; 
                margin-bottom: 15px;
            }
            .social-icons {
                flex-direction: column;
                gap: 15px;
            }
            .social-icons span {
                margin-right: 0;
            }
            
            footer {
                padding: 8px; 
            }
            footer p {
                font-size: 12px; 
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logosaiyagym.png" alt="Logo del Gimnasio">

    <nav>
        <a href="#inicio">Inicio</a>

    <section id="inicio">

    <section id="galeria">

            <img src="Galeria3.jpg" alt="Gimnasio 3">

    </section>

    <section id="productos">

        <div class="gallery">
            <img src="Producto1.jpg" alt="Producto 1">
            <img src="Producto2.jpg" alt="Producto 2">
            <img src="Producto3.jpg" alt="Producto 3">
            <img src="Producto4.jpg" alt="Producto 4">
            <img src="Produco5.jpg" alt="Producto 5">
            <img src="Producto6.jpg" alt="Producto 6">
        </div>
    </section>

    <section id="contacto">
        <h2>Contacto</h2>
        <div class="social-icons">
            <a href="https://wa.me/56954176212" target="_blank">
                <img src="wsp.png" alt="WhatsApp">
                <span>+569 5417 6212</span>
            </a>
            
            <a href="https://www.instagram.com/saiyagym.training" target="_blank">
                <img src="instagram.png" alt="Instagram">
                <span>@saiyagym.training</span>
            </a>
        </div>

        <section id="direccion">
            <h2>Dirección</h2>
            <p>Visítanos en:</p>
            <p>Los Copihues 364, Cumpeo, Río Claro, Maule</p>
            <iframe src="https://www.google.com/maps/embed?pb=" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </section>

    <footer>
        <p>© 2026 SAIYAGYM SPA. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
