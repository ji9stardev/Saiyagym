<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaiyaGym</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1b1918;
            color: white;
        }
        header {
            background-color: rgb(231, 77, 0);
            color: rgb(0, 0, 0);
            padding: 10px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: fadeInUp 1s ease-out;
        }
        header img {
            max-width: 58px;
            height: auto;
            margin-right: 20px;
        }
        header .title-image {
            max-width: 130px;
            height: auto;
        }
        header h1, header p {
            font-size: 25px;
            margin: 0;
        }
        header div {
            display: flex;
            flex-direction: column;
        }
        nav {
            background-color: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInUp 1s ease-out;
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
            transform: scale(1.1);
        }
        section {
            padding: 20px;
            margin: 20px;
            background-color: #1d1a1a;
            color: white;
            border-radius: 8px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        footer {
            background-color: rgb(231, 77, 0);
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
            animation: fadeInUp 1s ease-out;
            z-index: 10;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            animation: fadeInUp 1s ease-out;
        }
        .gallery img {
            width: 32%;
            height: auto;
            border-radius: 8px;
            object-fit: cover;
            animation: fadeIn 1s forwards;
        }
        .bienvenida-gallery {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .bienvenida-gallery img {
            width: 32%;
            height: auto;
            border-radius: 8px;
        }
        .planes {
            display: flex;
            justify-content: center;
        }
        #direccion {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: 40px 0;
        }
        #direccion h2 {
            margin-bottom: 20px;
        }
        #mapa {
            width: 100%;
            height: 400px;
            border-radius: 8px;
        }
        .social-icons {
            margin-top: 20px;
            display: flex;
            align-items: center;
            animation: fadeInUp 1s ease-out;
        }
        .social-icons a {
            margin-right: 10px;
            text-decoration: none; 
        }
        .social-icons img {
            width: 30px;
            height: 30px;
            animation: fadeIn 1s forwards;
        }
        .social-icons span {
            margin-right: 20px;
            font-size: 16px;
            color: white;
            align-self: center;
        }

        /* =========================================
           MODO CELULAR (Diseño Responsivo)
           ========================================= */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            header img {
                margin-right: 0;
                margin-bottom: 10px;
            }
            nav {
                flex-wrap: wrap;
            }
            nav a {
                padding: 10px;
                font-size: 15px;
                width: 25%;
                box-sizing: border-box;
            }
            .gallery img, .bienvenida-gallery img {
                width: 90%; 
                margin-bottom: 15px;
            }
            .bienvenida-gallery {
                flex-direction: column;
                align-items: center;
            }
            .planes img {
                width: 95%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logosaiyagym.png" alt="Logo del Gimnasio">
        <img src="TITULOLOGO.jpg" alt="Título de la página" class="title-image">

    <nav>
        <a href="#inicio">Inicio</a>

        <a href="#direccion">Dirección</a>

    <section id="inicio">

    <section id="galeria">

    <section id="productos">

        <div class="gallery">
            <img src="Producto1.jpg" alt="Producto 1">

            <img src="Producto3.jpg" alt="Producto 3">
            <img src="Producto4.jpg" alt="Producto 4">
            <img src="Produco5.jpg" alt="Producto 5">
            <img src="Producto6.jpg" alt="Producto 6">
        </div>
    </section>

    <section id="contacto">
        <h2>Contacto</h2>
        <div class="social-icons">
            <a href="https://wa.me/56954176212" target="_blank">
                <img src="wsp.png" alt="WhatsApp">
            </a>
            <a href="https://wa.me/56954176212" target="_blank">
                <span>+569 5417 6212</span>
            </a>
            
            <a href="https://www.instagram.com/saiyagym.training" target="_blank">
                <img src="instagram.png" alt="Instagram">
            </a>
            <a href="https://www.instagram.com/saiyagym.training" target="_blank">
                <span>@saiyagym.training</span>
            </a>
        </div>

        <section id="direccion">
            <h2>Dirección</h2>
            <p>Visítanos en:</p>
            <p>Los Copihues 364, Cumpeo, Río Claro, Maule</p>
            <iframe src="https://www.google.com/maps/embed?pb=" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </section>

    <footer>
        <p>© 2026 SAIYAGYM SPA. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
